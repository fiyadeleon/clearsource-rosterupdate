"HomePage As screen.'tabletLayout_Tutorial_ver3.0'":

    RectTextBkg1 As rectangle:
        Height: =Parent.Height
        Width: =Parent.Width / 2
        X: =Parent.Width/2
        ZIndex: =1

    "'Roster Update Selection' As label":
        Color: =RGBA(0, 18, 107, 1)
        DisabledBorderColor: =RGBA(0, 18, 107, 1)
        DisabledColor: =RGBA(0, 18, 107, 1)
        DisabledFill: =RGBA(0, 18, 107, 1)
        FontWeight: =FontWeight.Bold
        Height: =39
        Text: |-
            ="REQUEST TYPE:"
        Width: =328
        X: =187
        Y: =337
        ZIndex: =2

    drpRosterSelection As dropdown:
        ChevronBackground: =RGBA(0, 18, 107, 1)
        Color: =RGBA(0, 18, 107, 1)
        Default: =""
        DisabledBorderColor: =RGBA(0, 18, 107, 1)
        DisabledColor: =RGBA(0, 18, 107, 1)
        DisabledFill: =RGBA(0, 18, 107, 1)
        Items: =["Select your answer", "New Hire", "Termination", "Promotion", "Lateral Transfer", "Other User Status"]
        X: =187
        Y: =390
        ZIndex: =3

    btnFirstPageNext As button:
        Fill: =RGBA(0, 18, 107, 1)
        OnSelect: |
            =
            Notify("Successfully submitted the information.", NotificationType.Success) &&
            Navigate(HomePage, ScreenTransition.None) &&
            Office365Outlook.SendEmailV2(
            "helpdesk@clearsourcebpo.com",
            Concatenate("[PROMOTION] Sample "),
            Concatenate(
            "<html>",
            "<body>",   
            "Hi Team,", "<br>", "<br>",
            "Please see details for promotion of, Juan Week <br><br>",
            "Employee ID: 9999 <br>",
            "Employee Name: Juan Week <br>",
            "Site: Pasig <br>",
            "New Business Unit: Pasig <br>",
            "New Program/Client: Excommunicado <br>",
            "New Position: AnyPosition <br>",
            "New Sub-Unit: AnyPosition <br>",
            "Billability: billbill <br>",
            "New Schedule: Anyposition <br>",
            "New Supervisor: Anysupervisor <br><br>",
            "Table of all fields: FarmFields <br>",
            "<table border='1px solid black'><tr background-color='blue'><th>Field</th><th>Value</th></tr>",
            "<tr><td>New Business Unit</td><td>aaaaaa</td></tr>",
            "<tr><td>New Program/Client</td><td>aaaaaa</td></tr>",
            "<tr><td>New Position</td><td>aaaaaa</td></tr>",
            "<tr><td>New Sub-Unit</td><td>aaaaa</td></tr>",
            "<tr><td>Billability</td><td>aaaaaa</td></tr>",
            "<tr><td>New Schedule</td><td>aaaaaaa</td></tr>",
            "<tr><td>New Supervisor</td><td>aaaaa</td></tr>",
            "</table>",
            "</body>",
            "</html>"
            )
            ) 
        Text: ="Next"
        X: =355
        Y: =455
        ZIndex: =4

